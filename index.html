<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>議事録アシスト＆録音ツール</title>
    <!-- 未来的なフォントをインポート -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: {
                            pink: '#ff2a85',
                            blue: '#00f3ff',
                            purple: '#bc13fe',
                            green: '#39ff14'
                        },
                        dark: {
                            bg: '#05000a',
                            card: 'rgba(15, 5, 30, 0.65)'
                        }
                    },
                    fontFamily: {
                        cyber: ['Orbitron', 'sans-serif'],
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #0a0015, #240b36);
            background-size: 400% 400%;
            animation: cosmic-bg 15s ease infinite;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        
        @keyframes cosmic-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .pulse-recording {
            animation: pulse-neon 1.5s infinite;
        }
        
        @keyframes pulse-neon {
            0% { box-shadow: 0 0 0 0 rgba(255, 42, 133, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 42, 133, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 42, 133, 0); }
        }

        /* ネオンテキストエフェクト */
        .glow-text-blue {
            text-shadow: 0 0 8px #00f3ff, 0 0 20px #00f3ff;
        }
        .glow-text-pink {
            text-shadow: 0 0 8px #ff2a85, 0 0 20px #ff2a85;
        }
        
        button {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

    <!-- サイケデリックな背景オーブ（装飾） -->
    <div class="absolute top-10 left-10 w-64 h-64 bg-neon-purple/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-10 right-10 w-80 h-80 bg-neon-blue/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="bg-dark-card backdrop-blur-xl rounded-2xl shadow-[0_0_30px_rgba(188,19,254,0.3)] w-full max-w-lg overflow-hidden border border-neon-purple/50 relative z-10">
        
        <!-- ヘッダー -->
        <div class="p-6 text-center border-b border-neon-purple/30 bg-black/40">
            <div class="flex justify-center mb-3 text-neon-blue drop-shadow-[0_0_10px_#00f3ff]">
                <i data-lucide="mic" class="w-12 h-12"></i>
            </div>
            <h1 class="text-2xl font-cyber font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-neon-blue via-neon-purple to-neon-pink glow-text-blue">VOICE LOG.AI</h1>
            <p class="text-neon-blue/80 text-xs mt-2 font-cyber tracking-widest">>> AUTO_TRANSCRIPT_PROTOCOL_INITIATED</p>
        </div>

        <div class="p-6 space-y-6">
            
            <!-- STEP 1: 録音セクション -->
            <section class="bg-black/40 rounded-xl p-5 border border-neon-blue/40 shadow-[inset_0_0_15px_rgba(0,243,255,0.1)]">
                <h2 class="text-md font-cyber font-bold text-neon-blue mb-4 flex items-center gap-2 border-b border-neon-blue/30 pb-2">
                    <span class="text-xs bg-neon-blue text-black px-2 py-1 rounded">SYS.01</span>
                    AUDIO_RECORDING_MODULE
                </h2>
                
                <div class="text-center">
                    <div class="text-5xl font-cyber font-bold text-neon-pink glow-text-pink tracking-widest mb-4" id="timerDisplay" aria-live="polite">00:00</div>
                    
                    <!-- 波形表示キャンバス -->
                    <canvas id="visualizer" class="w-full h-24 mb-5 rounded bg-black/80 border border-neon-pink/30 shadow-[0_0_10px_rgba(255,42,133,0.2)]" aria-label="音声波形"></canvas>
                    
                    <div class="flex flex-col gap-3">
                        <button id="startBtn" class="bg-transparent border-2 border-neon-pink text-neon-pink hover:bg-neon-pink hover:text-black hover:shadow-[0_0_20px_#ff2a85] text-lg font-bold py-3 px-6 rounded-lg font-cyber tracking-widest flex items-center justify-center gap-2">
                            <i data-lucide="power" class="w-5 h-5"></i> START_REC
                        </button>
                        <button id="stopBtn" class="bg-neon-pink text-black border-2 border-neon-pink shadow-[0_0_20px_#ff2a85] text-lg font-bold py-3 px-6 rounded-lg font-cyber tracking-widest flex items-center justify-center gap-2 hidden">
                            <i data-lucide="square" class="w-5 h-5 fill-current"></i> STOP_REC
                        </button>
                    </div>

                    <!-- 録音完了後のダウンロード領域 -->
                    <div id="downloadArea" class="hidden mt-5 pt-5 border-t border-neon-blue/30">
                        <div class="bg-neon-green/10 border border-neon-green/50 rounded-lg p-3 mb-4">
                            <p class="text-neon-green font-cyber tracking-widest text-sm flex items-center justify-center gap-2 drop-shadow-[0_0_5px_#39ff14]">
                                <i data-lucide="check-circle" class="w-4 h-4"></i> AUDIO_DATA_SAVED
                            </p>
                        </div>
                        <button id="saveBtn" class="w-full bg-transparent border-2 border-neon-green text-neon-green hover:bg-neon-green hover:text-black hover:shadow-[0_0_20px_#39ff14] text-sm font-bold py-3 px-6 rounded-lg font-cyber tracking-wider flex items-center justify-center gap-2">
                            <i data-lucide="download" class="w-5 h-5"></i> DOWNLOAD_MP3
                        </button>
                    </div>
                </div>
            </section>

            <!-- STEP 2: AI連携セクション -->
            <section class="bg-black/40 rounded-xl p-5 border border-neon-purple/40 shadow-[inset_0_0_15px_rgba(188,19,254,0.1)]">
                <h2 class="text-md font-cyber font-bold text-neon-purple mb-4 flex items-center gap-2 border-b border-neon-purple/30 pb-2">
                    <span class="text-xs bg-neon-purple text-black px-2 py-1 rounded">SYS.02</span>
                    AI_INTEGRATION_SYNC
                </h2>
                
                <div class="bg-black/60 p-4 rounded border border-neon-purple/30 mb-5 text-sm">
                    <h3 class="font-cyber font-bold text-neon-blue mb-2 tracking-wider drop-shadow-[0_0_3px_#00f3ff]">> NotebookLM_PROTOCOL</h3>
                    <ol class="list-decimal list-inside text-gray-300 space-y-2 opacity-90">
                        <li>下のボタンで指示文をクリップボードにコピーし、AIを展開。</li>
                        <li>「新しいソース」へ<strong>抽出した音声データ</strong>をアップロード。</li>
                        <li>ターミナル（チャット欄）に<strong>指示文をペーストして実行</strong>。</li>
                    </ol>
                </div>
                
                <button id="actionBtn" class="w-full bg-transparent border-2 border-neon-blue text-neon-blue hover:bg-neon-blue hover:text-black hover:shadow-[0_0_20px_#00f3ff] font-bold py-4 px-6 rounded-lg font-cyber tracking-widest flex items-center justify-center gap-2">
                    <i data-lucide="cpu" class="w-5 h-5"></i> COPY_PROMPT & LAUNCH_AI
                </button>
                
                <div id="successMsg" class="hidden mt-4 text-black font-cyber font-bold text-center bg-neon-blue p-2 rounded shadow-[0_0_15px_#00f3ff]" role="alert">
                    > DATA_COPIED. AWAITING_PASTE_COMMAND.
                </div>
            </section>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 録音関連の変数
        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;
        let startTime;
        let timerInterval;
        let audioContext;
        let analyser;
        let dataArray;
        let animationId;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const downloadArea = document.getElementById('downloadArea');
        const saveBtn = document.getElementById('saveBtn');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        // サイバーパンク風のフラットライン（待機状態）
        function drawFlatLine() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            canvasCtx.fillStyle = '#05000a';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            
            // サイバーグリッド風の背景線
            canvasCtx.strokeStyle = 'rgba(0, 243, 255, 0.1)';
            canvasCtx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=20) {
                canvasCtx.beginPath(); canvasCtx.moveTo(i, 0); canvasCtx.lineTo(i, canvas.height); canvasCtx.stroke();
            }
            
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#00f3ff';
            canvasCtx.shadowBlur = 10;
            canvasCtx.shadowColor = '#00f3ff';
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, canvas.height / 2);
            canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();
            canvasCtx.shadowBlur = 0; // リセット
        }
        
        window.addEventListener('load', drawFlatLine);
        window.addEventListener('resize', drawFlatLine);

        // タイマー更新 (デジタルミリ秒っぽく見せるが実際は秒)
        function updateTimer() {
            const now = Date.now();
            const diff = new Date(now - startTime);
            const minutes = diff.getUTCMinutes().toString().padStart(2, '0');
            const seconds = diff.getUTCSeconds().toString().padStart(2, '0');
            // サイバー感のためにコロンを点滅させる
            const colon = now % 1000 < 500 ? ':' : ' ';
            timerDisplay.textContent = `${minutes}${colon}${seconds}`;
        }

        // 録音開始
        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                currentAudioBlob = null;

                // 波形ビジュアライザーの設定
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;

                // サイケデリックな波形描画ループ
                const drawWaveform = () => {
                    animationId = requestAnimationFrame(drawWaveform);
                    analyser.getByteTimeDomainData(dataArray);

                    // 残像を残すために半透明の黒で塗りつぶす
                    canvasCtx.fillStyle = 'rgba(5, 0, 10, 0.2)';
                    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

                    canvasCtx.lineWidth = 3;
                    
                    // 時間経過で色が変わるサイケデリックな色相変化
                    const hue = (Date.now() / 15) % 360;
                    const neonColor = `hsl(${hue}, 100%, 60%)`;
                    
                    canvasCtx.strokeStyle = neonColor;
                    canvasCtx.shadowBlur = 15;
                    canvasCtx.shadowColor = neonColor;
                    canvasCtx.beginPath();

                    const sliceWidth = canvas.width * 1.0 / bufferLength;
                    let x = 0;

                    for (let i = 0; i < bufferLength; i++) {
                        const v = dataArray[i] / 128.0;
                        const y = v * canvas.height / 2;

                        // 波の振幅を少し大げさにする
                        const amplifiedY = canvas.height/2 + (y - canvas.height/2) * 1.5;

                        if (i === 0) {
                            canvasCtx.moveTo(x, amplifiedY);
                        } else {
                            canvasCtx.lineTo(x, amplifiedY);
                        }
                        x += sliceWidth;
                    }
                    canvasCtx.lineTo(canvas.width, canvas.height / 2);
                    canvasCtx.stroke();
                    canvasCtx.shadowBlur = 0; // リセット
                };
                drawWaveform();

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    currentAudioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    downloadArea.classList.remove('hidden');
                };

                mediaRecorder.start();
                
                // UI変更
                startBtn.classList.add('hidden');
                stopBtn.classList.remove('hidden');
                stopBtn.classList.add('pulse-recording');
                downloadArea.classList.add('hidden');
                
                // タイマー開始
                startTime = Date.now();
                timerDisplay.classList.replace('text-neon-pink', 'text-neon-blue');
                timerDisplay.classList.replace('glow-text-pink', 'glow-text-blue');
                timerInterval = setInterval(updateTimer, 50); // 点滅を滑らかにするため間隔を短く

            } catch (err) {
                alert('マイクへのアクセスが拒否されたか、マイクが見つかりません。\nブラウザの設定でマイクを許可してください。');
                console.error(err);
            }
        });

        // 録音停止
        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }

            if (animationId) cancelAnimationFrame(animationId);
            if (audioContext) audioContext.close();
            drawFlatLine();
            
            // UI変更
            stopBtn.classList.remove('pulse-recording');
            stopBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            startBtn.innerHTML = `<i data-lucide="rotate-ccw" class="w-5 h-5"></i> REBOOT_REC`;
            lucide.createIcons();
            
            clearInterval(timerInterval);
            timerDisplay.classList.replace('text-neon-blue', 'text-neon-pink');
            timerDisplay.classList.replace('glow-text-blue', 'glow-text-pink');
            timerDisplay.textContent = timerDisplay.textContent.replace(' ', ':'); // コロンを戻す
        });

        // 名前を付けて保存処理
        saveBtn.addEventListener('click', async () => {
            if (!currentAudioBlob) return;

            const now = new Date();
            const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            const defaultFilename = `LOG_${dateStr}.mp3`;

            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: defaultFilename,
                        types: [{
                            description: 'MP3 AUDIO DATA',
                            accept: { 'audio/mp3': ['.mp3'] },
                        }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(currentAudioBlob);
                    await writable.close();
                    
                    const originalHtml = saveBtn.innerHTML;
                    saveBtn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i> DATA_SECURED`;
                    saveBtn.classList.add('bg-neon-green', 'text-black');
                    saveBtn.classList.remove('bg-transparent', 'text-neon-green');
                    lucide.createIcons();
                    setTimeout(() => {
                        saveBtn.innerHTML = originalHtml;
                        saveBtn.classList.remove('bg-neon-green', 'text-black');
                        saveBtn.classList.add('bg-transparent', 'text-neon-green');
                        lucide.createIcons();
                    }, 3000);

                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('Save Error:', err);
                        alert('システムエラー：ファイルの保存に失敗しました。');
                    }
                }
            } else {
                const audioUrl = URL.createObjectURL(currentAudioBlob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = audioUrl;
                a.download = defaultFilename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(audioUrl);
            }
        });

        // AI連携関連
        const promptText = `アップロードした音声データから、Wordにそのまま貼り付けられる形式でビジネス議事録を作成してください。
Markdownの記号（**や#など）は一切使わず、自然なテキストで出力してください。
以下のフォーマットに厳密に従い、音声の内容から情報を抽出して空欄を埋めてください。

【会議名】議事録

1. 基本情報
日時：
場所・形式：
参加者：
欠席者：
作成者：

2. 目的・アジェンダ
会議の目的：
アジェンダ：

3. 決定事項サマリー
・（決定事項を1文で簡潔に記載）

4. 議題ごとの詳細
議題1：
結論：
経緯・意見：（誰がどのような意見を出したか、決定に至った理由や懸念点など）
議題2：
結論：
経緯・意見：

5. 保留・未決定事項
・（今回決まらず、次回以降に持ち越しとなった事項を記載）

6. Next Action（タスク）
・[担当者名] ｜ [期限] ｜ [タスク内容]

7. 次回予定
日時：
場所：
議題：`;

        const actionBtn = document.getElementById('actionBtn');
        const msg = document.getElementById('successMsg');

        actionBtn.addEventListener('click', () => {
            const textarea = document.createElement('textarea');
            textarea.value = promptText;
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                msg.classList.remove('hidden');
                
                setTimeout(() => {
                    window.open('https://notebooklm.google.com/', '_blank');
                    setTimeout(() => msg.classList.add('hidden'), 5000);
                }, 1000);
            } catch (err) {
                alert('クリップボードへのアクセスが拒否されました。');
            } finally {
                document.body.removeChild(textarea);
            }
        });
    </script>
</body>
</html>
